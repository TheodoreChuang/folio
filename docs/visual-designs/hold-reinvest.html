<html lang="en">
<head>

<title>Folio — Hold vs Sell and Reinvest</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<!--
  Folio — Hold vs Sell and Reinvest (live comparison)
  ─────────────────────────────────────────────────────────────────
  Maps to Next.js route:  /plan/hold-reinvest
  Shared shell:           sidebar.js, folio.css
  This screen:            hold-reinvest.css + a small React app
                            hr-engine.jsx   pure calc engine + portfolio data
                            hr-inputs.jsx   left column (3-step controlled form)
                            hr-outputs.jsx  right ledgers + full-width analysis
                            hr-tweaks.jsx   Tweaks panel (growth scenario, CGT)
                            hr-app.jsx      state, persistence, mount

  Opened from the Plan command-deck card "Hold or reinvest". Replaces the
  old static tpl-sale "Model a sale" template in plan.html.
-->
<body data-page="plan">
<div class="app">

  <!-- Sidebar injected by sidebar.js -->

  <main class="main">
    <div class="main-inner">

    <section class="screen is-active" data-screen="plan" data-screen-label="Hold vs Sell and Reinvest">

      <button type="button" class="mp-back" data-goto="plan">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M7 2.5 3.5 6 7 9.5"/></svg>
        All scenarios
      </button>

      <div class="page-head">
        <div>
          <h1 class="title">Hold vs Sell and Reinvest</h1>
          <p class="subtitle">Would your capital work harder in a different market — after the cost of getting there?</p>
        </div>
      </div>

      <div class="hr-wrap">
        <div id="hr-root"></div>
      </div>

    </section>

    </div>
  </main>
</div>

<script src="sidebar.js"></script>
<script src="folio.js"></script>
<script src="agent.js"></script>

<script src="hr-engine.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="hr-inputs.jsx"></script>
<script type="text/babel" src="hr-outputs.jsx"></script>
<script type="text/babel" src="hr-tweaks.jsx"></script>
<script type="text/babel" src="hr-app.jsx"></script>
</body>
</html>
