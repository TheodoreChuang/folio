<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>Folio — Rate sensitivity</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,30..100&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="folio.css" />
<link rel="stylesheet" href="rate-sensitivity.css" />
<link rel="stylesheet" href="agent.css" />
</head>
<!--
  Folio — Rate sensitivity (live calculator)
  ─────────────────────────────────────────────────────────────────
  Maps to Next.js route:  /plan/rate-sensitivity
  Shared shell:           sidebar.js, folio.css
  This screen:            rate-sensitivity.css + a small React app
                            rs-engine.jsx   pure calc engine + variable loans
                            rs-slider.jsx   the one input (rate-move slider)
                            rs-outputs.jsx  results: headline, ladder, loan table
                            rs-tweaks.jsx   Tweaks panel (household, quick move)
                            rs-app.jsx      state, persistence, mount

  Opened from the Plan command-deck card "Rate sensitivity". Each loan
  keeps its own rate; the slider moves them all by the same amount.
-->
<body data-page="plan">
<div class="app">

  <!-- Sidebar injected by sidebar.js -->

  <main class="main">
    <div class="main-inner">

    <section class="screen is-active" data-screen="plan" data-screen-label="Rate sensitivity">

      <a class="rs-back" href="plan.html">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M7 2.5 3.5 6 7 9.5"/></svg>
        All scenarios
      </a>

      <div class="page-head">
        <div>
          <h1 class="title">Rate sensitivity</h1>
          <p class="subtitle">Stress every variable loan against a rate rise or fall, and see where the cashflow lands.</p>
        </div>
      </div>

      <div class="rs-wrap">
        <div id="rs-root"></div>
      </div>

    </section>

    </div>
  </main>
</div>

<script src="sidebar.js"></script>
<script src="folio.js"></script>
<script src="agent.js"></script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="rs-engine.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="rs-slider.jsx"></script>
<script type="text/babel" src="rs-outputs.jsx"></script>
<script type="text/babel" src="rs-tweaks.jsx"></script>
<script type="text/babel" src="rs-app.jsx"></script>
</body>
</html>
