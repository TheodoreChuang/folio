<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>Folio — Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,30..100&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="folio.css" />
<link rel="stylesheet" href="plan.css" />
</head>
<!--
  Folio — Plan screen (command deck)
  ─────────────────────────────────────────────────────────────────
  Maps to Next.js route:  /plan
  Shared shell:           sidebar.js (injects <aside class="sidebar">)
                          folio.css  (design tokens + components)
                          plan.css   (deck + takeover chrome)
                          plan.js    (drill-in / back, remembers open calc)

  Each scenario is a question card. Clicking it drills into the full
  calculator (cloned from a <template>) with a back button.
-->
<body data-page="plan">
<div class="app">

  <!-- Sidebar is injected here by sidebar.js -->

  <main class="main">
    <div class="main-inner">

    <section class="screen is-active" data-screen="plan" data-screen-label="Plan">

      <div class="page-head">
        <div>
          <h1 class="title">Plan</h1>
          <p class="subtitle">Model what happens when conditions change — or when you change the portfolio.</p>
        </div>
      </div>

      <div class="deck-grid" id="deck-grid">
        <button type="button" class="scenario-card" data-scenario="rate">
          <span class="sc-eyebrow">If conditions change</span>
          <div class="sc-title">Rate sensitivity</div>
          <p class="sc-question">Can you handle a rate rise of 1%?</p>
          <div class="sc-foot">
            <span class="open">Model rate scenarios <span class="arrow">→</span></span>
            <span class="meta">3 variable loans</span>
          </div>
          <div class="sc-foot--disabled">
            <span class="locked">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3.5" y="7" width="9" height="6.5" rx="1.2"/><path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2"/></svg>
              <span class="reason">Add a variable loan to model rate scenarios</span>
            </span>
          </div>
        </button>

        <button type="button" class="scenario-card" data-scenario="io">
          <span class="sc-eyebrow">If conditions change</span>
          <div class="sc-title">Interest-only rollover</div>
          <p class="sc-question">When your interest-only period ends, can you cover the payment jump?</p>
          <div class="sc-foot">
            <span class="open">See the schedule <span class="arrow">→</span></span>
            <span class="meta">2 IO loans</span>
          </div>
          <div class="sc-foot--disabled">
            <span class="locked">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3.5" y="7" width="9" height="6.5" rx="1.2"/><path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2"/></svg>
              <span class="reason">Add an interest-only loan with an end date</span>
            </span>
          </div>
        </button>

        <button type="button" class="scenario-card" data-scenario="purchase">
          <span class="sc-eyebrow">If you change the portfolio</span>
          <div class="sc-title">Model a purchase</div>
          <p class="sc-question">Ready for your next property?</p>
          <div class="sc-foot">
            <span class="open">Model a purchase <span class="arrow">→</span></span>
          </div>
        </button>

        <button type="button" class="scenario-card" data-scenario="sale">
          <span class="sc-eyebrow">If you change the portfolio</span>
          <div class="sc-title">Hold or reinvest</div>
          <p class="sc-question">Would your capital work harder in a different market?</p>
          <div class="sc-foot">
            <span class="open">Hold or reinvest <span class="arrow">→</span></span>
            <span class="meta">3 properties</span>
          </div>
          <div class="sc-foot--disabled">
            <span class="locked">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3.5" y="7" width="9" height="6.5" rx="1.2"/><path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2"/></svg>
              <span class="reason">Add a property to model a sale</span>
            </span>
          </div>
        </button>
      </div>

      <div class="deck-takeover" id="deck-takeover" hidden></div>

    </section>

    </div>
  </main>
</div>

<div id="tweaks-root"></div>

<script src="sidebar.js"></script>
<script src="folio.js"></script>
<script src="plan.js"></script>

<!-- Tweaks panel (React) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="plan-tweaks.jsx"></script>
</body>
</html>
